services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: keysmith
      POSTGRES_PASSWORD: keysmith
      POSTGRES_DB: keysmith
    ports:
      - "5433:5432" # 5433 on the host; 5432 is commonly taken by other local DBs
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keysmith -d keysmith"]
      interval: 2s
      timeout: 2s
      retries: 15

  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025" # web UI
      - "1025:1025" # SMTP

volumes:
  pgdata:
